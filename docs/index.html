<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>Birds</title>
    <style>
      body {
        background: #f2eee6;
        margin: 0;
        padding: 16px;
        font-family: sans-serif;
        font-size: 12px;
      }
      main {
        max-width: 50rem;
        margin: 0 auto;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }
      .item img {
        width: 100%;
        display: block;
        background-color: white;
      }
      .item a {
        display: block;
      }
      .label {
        margin-top: 4px;
      }
      .label a {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        text-decoration: none;
        color: #000;
        font-size: 12px;
      }
      .label a:hover {
        text-decoration: underline;
      }
      .desc {
        margin-top: 2px;
        color: #555;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Vögel · Swiss Forum for Social Entrepreneurship</h1>
      <div class="grid" id="grid"></div>
    </main>
    <script>
      const files = [
        {
          file: "qr-code.svg",
          name: "QR-Code",
          description:
            "Der QR-Code enthält die URL zur Umfrage (https://link.team-ensemble.ch/ssef-finish-2026)",
        },
        { file: "eule.png", name: "Eule" },
        { file: "spatz.png", name: "Spatz" },
        { file: "moewe.png", name: "Möwe" },
        { file: "adler.png", name: "Adler" },
        { file: "papagei.png", name: "Papagei" },
        { file: "specht.png", name: "Specht" },
        { file: "rabe.png", name: "Rabe" },
        { file: "flamingo.png", name: "Flamingo" },
        { file: "schwalbe.png", name: "Schwalbe" },
        { file: "habicht.png", name: "Habicht" },
      ];

      const grid = document.getElementById("grid");

      files.forEach((entry) => {
        if (entry.deleted) return;

        const item = document.createElement("div");
        item.className = "item";

        const img = document.createElement("img");
        img.src = `edit/${entry.file}`;
        img.alt = entry.name;
        item.appendChild(img);

        const label = document.createElement("div");
        label.className = "label";
        const a = document.createElement("a");
        a.href = `edit/${entry.file}`;
        a.download = entry.file;
        a.innerHTML = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6 1v7M3 6l3 3 3-3M1 10h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>${entry.name}`;
        label.appendChild(a);
        item.appendChild(label);

        if (entry.description) {
          const desc = document.createElement("div");
          desc.className = "desc";
          desc.textContent = entry.description;
          item.appendChild(desc);
        }

        grid.appendChild(item);
      });
    </script>
  </body>
</html>
